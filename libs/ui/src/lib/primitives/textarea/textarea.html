<div class="jp-textarea__field">
  @if (label()) {
  <label class="jp-textarea__label" [attr.for]="resolvedId()"
    >{{ label() }}</label
  >
  }
  <textarea
    class="jp-textarea__control"
    [attr.id]="resolvedId()"
    [attr.rows]="rows()"
    [attr.placeholder]="placeholder() || null"
    [attr.aria-invalid]="invalid() ? true : null"
    [attr.aria-describedby]="describedBy()"
    [disabled]="isDisabled()"
    [readOnly]="readonly()"
    [value]="value()"
    [style.--jp-field-min-height]="controlMinHeight()"
    (input)="onInput($event)"
    (blur)="onBlur()"
  ></textarea>
  @if (error()) {
  <p class="jp-textarea__error" [attr.id]="errorId()" role="alert">
    {{ error() }}
  </p>
  } @else if (hint()) {
  <p class="jp-textarea__hint" [attr.id]="hintId()">{{ hint() }}</p>
  }
</div>
